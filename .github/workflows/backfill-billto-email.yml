name: Backfill Draft Order Bill-To Email

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: true
        default: "dry_run"
        type: choice
        options:
          - dry_run
          - live
      days_back:
        description: "Only include draft orders created in the last N days. Default 60."
        required: true
        default: "60"
      created_after:
        description: "Optional override: include drafts created on/after YYYY-MM-DD"
        required: false
        default: ""
      created_before:
        description: "Optional: include drafts created on/before YYYY-MM-DD"
        required: false
        default: ""
      po_number:
        description: "Optional: limit to one PO number first"
        required: false
        default: ""
      update_customer_email:
        description: "Also update Shopify customer email when it matches the old bad draft email"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

jobs:
  backfill:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests python-dotenv

      - name: Build arguments
        id: args
        shell: bash
        run: |
          ARGS="--days-back '${{ github.event.inputs.days_back }}'"

          if [ -n "${{ github.event.inputs.created_after }}" ]; then
            ARGS="$ARGS --created-after '${{ github.event.inputs.created_after }}'"
          fi

          if [ -n "${{ github.event.inputs.created_before }}" ]; then
            ARGS="$ARGS --created-before '${{ github.event.inputs.created_before }}'"
          fi

          if [ -n "${{ github.event.inputs.po_number }}" ]; then
            ARGS="$ARGS --po '${{ github.event.inputs.po_number }}'"
          fi

          if [ "${{ github.event.inputs.mode }}" = "live" ]; then
            ARGS="$ARGS --live"
          fi

          if [ "${{ github.event.inputs.update_customer_email }}" = "true" ]; then
            ARGS="$ARGS --update-customer-email"
          fi

          echo "args=$ARGS" >> "$GITHUB_OUTPUT"

      - name: Run backfill
        env:
          SHOPIFY_TOKEN: ${{ secrets.SHOPIFY_TOKEN }}
          SHOPIFY_STORE: ${{ secrets.SHOPIFY_STORE }}
          SHOPIFY_API_VERSION: "2024-10"
          DRY_RUN: ${{ github.event.inputs.mode == 'dry_run' && 'true' || 'false' }}
        run: |
          eval python backfill_shopify_draft_order_billto_email.py ${{ steps.args.outputs.args }}

      - name: Upload audit CSV
        uses: actions/upload-artifact@v4
        with:
          name: draft-order-billto-email-backfill-audit
          path: draft_order_billto_email_backfill_*.csv
          if-no-files-found: error
